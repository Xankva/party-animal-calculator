<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Party Animal · Fishing Calculator & Journal</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- CSS Stylesheet -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Vue 3 Framework -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>
    <!-- Confetti Canvas celebration -->
    <canvas id="confetti-canvas" style="position: fixed; inset: 0; pointer-events: none; z-index: 9999; width: 100vw; height: 100vh;"></canvas>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div id="app" v-cloak>
        <!-- Header -->
        <header>
            <div class="brand">
                <span class="brand-icon">🎣</span>
                <div class="brand-info">
                    <h1>Party Animal</h1>
                    <p>Fishing Calculator</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary btn-icon" @click="confirmReset" title="Reset Session Progress">
                    ↺ Reset Session
                </button>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <nav class="nav-tabs">
            <button class="tab-btn" :class="{ active: currentTab === 'dashboard' }" @click="currentTab = 'dashboard'">
                📊 Dashboard & Calc
            </button>
            <button class="tab-btn" :class="{ active: currentTab === 'journal' }" @click="currentTab = 'journal'">
                📔 Fish Journal
            </button>
            <button class="tab-btn" :class="{ active: currentTab === 'gear' }" @click="currentTab = 'gear'">
                🛠️ Gear Guide
            </button>
            <button class="tab-btn" :class="{ active: currentTab === 'stats' }" @click="currentTab = 'stats'">
                📈 Collection Stats
            </button>
        </nav>

        <!-- Tab Content -->
        <main class="container" :class="{ 'dashboard-grid': currentTab === 'dashboard' }">
            
            <!-- ── DASHBOARD & CALCULATOR TAB ── -->
            <template v-if="currentTab === 'dashboard'">
                <!-- Left Column: Circular Progress, Stats & Manual Calculator -->
                <div style="display: flex; flex-direction: column; gap: 20px;">
                    <!-- Circular progress ring card -->
                    <div class="glass-card ring-container">
                        <div class="ring-wrap">
                            <svg class="ring-svg" viewBox="0 0 180 180">
                                <circle class="ring-track" cx="90" cy="90" r="80"/>
                                <circle class="ring-fill" cx="90" cy="90" r="80"
                                    :style="ringStyle"
                                    :stroke="ringColor"/>
                            </svg>
                            <div class="ring-center">
                                <div class="ring-num">{{ total }}</div>
                                <div class="ring-cap">/ 900</div>
                                <div class="ring-pct">{{ pct }}%</div>
                            </div>
                        </div>

                        <!-- Mini cap status indicator -->
                        <div v-if="isCapped" style="color: var(--mint); font-family: var(--mono); font-size: 11px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 6px;">
                            🏆 DAILY CAP HIT
                        </div>
                        <div v-else style="color: var(--txt-2); font-family: var(--sans); font-size: 12px; margin-bottom: 12px;">
                            Remaining treats: <strong style="color: var(--amber);">{{ remaining }}</strong>
                        </div>
                        
                        <!-- Stats Grid -->
                        <div class="stats-grid">
                            <div class="stat-box">
                                <span class="stat-label">Last Gain</span>
                                <span class="stat-value mint">{{ lastGain === null ? '—' : '+' + lastGain }}</span>
                            </div>
                            <div class="stat-box">
                                <span class="stat-label">Rounds</span>
                                <span class="stat-value blue">{{ history.length }}</span>
                            </div>
                        </div>
                    </div>

                    <!-- Calculator Input Card (Merged) -->
                    <div class="glass-card">
                        <div class="card-header">
                            <h2 class="card-title card-title-mono">✏️ Record Fish Sale</h2>
                        </div>

                        <div class="input-row">
                            <div class="input-field">
                                <label class="input-label">Before Sale</label>
                                <input class="styled-input" type="number" inputmode="numeric" placeholder="0" v-model.number="tBefore">
                            </div>
                            <div class="arrow-divider">→</div>
                            <div class="input-field">
                                <label class="input-label">After Sale</label>
                                <input class="styled-input" type="number" inputmode="numeric" placeholder="0" v-model.number="tAfter" @keydown.enter="submit">
                            </div>
                        </div>

                        <!-- Delta preview -->
                        <div class="delta-preview" :class="deltaClass">
                            <div class="delta-label-wrap">
                                <span class="delta-title">Round Earnings</span>
                                <span class="delta-subtitle">Calculated difference</span>
                            </div>
                            <span class="delta-value" :class="deltaClass">
                                {{ deltaDisplay }}
                            </span>
                        </div>

                        <div v-if="cappedGain !== null && cappedGain < deltaRaw && deltaRaw > 0" style="font-family: var(--mono); font-size: 11px; color: var(--amber); text-align: center; margin-bottom: 12px;">
                            ⚠️ (capped +{{ cappedGain }} treats due to daily limit)
                        </div>

                        <button class="btn btn-primary" style="width: 100%;" @click="submit" :disabled="!canSubmit">
                            Record Sale &nbsp;→
                        </button>
                    </div>
                </div>

                <!-- Right Column: Transaction history list -->
                <div class="glass-card" style="display: flex; flex-direction: column;">
                    <div class="card-header">
                        <h2 class="card-title">📜 Session History</h2>
                        <span style="font-family: var(--mono); font-size: 11px; color: var(--txt-3);">{{ history.length }} entries</span>
                    </div>

                    <ul class="history-list">
                        <li v-if="history.length === 0" class="bucket-empty" style="border: none; padding: 60px 0;">
                            <span class="bucket-empty-icon">📭</span>
                            <span>No rounds recorded yet in this session. Start fishing!</span>
                        </li>
                        <li v-for="(item, i) in [...history].reverse()" :key="item.id" class="history-item">
                            <div class="history-info">
                                <span class="history-num">#{{ history.length - i }}</span>
                                <span class="history-delta" :class="item.delta > 0 ? 'pos' : item.delta < 0 ? 'neg' : 'zero'">
                                    {{ item.delta > 0 ? '+' : '' }}{{ item.delta }}
                                </span>
                                <div class="history-details">
                                    <span class="history-summary">
                                        Sale Round: {{ history.length - i }}
                                    </span>
                                    <span class="history-meta">
                                        {{ item.before }} → {{ item.after }} &bull; total: {{ item.runningTotal }}
                                    </span>
                                </div>
                            </div>
                            <button class="bucket-remove-btn" @click="deleteEntry(item.id)" title="Delete transaction entry">✕</button>
                        </li>
                    </ul>
                </div>
            </template>

            <!-- ── FISHING JOURNAL TAB ── -->
            <template v-if="currentTab === 'journal'">
                <!-- Filters panel -->
                <div class="glass-card">
                    <div class="card-header">
                        <h2 class="card-title">🔍 Search & Filter Journal</h2>
                    </div>
                    
                    <div class="journal-filters">
                        <div class="search-wrap">
                            <input class="search-input" type="text" placeholder="Search by fish name, description, spot..." v-model="searchInput">
                        </div>
                        <div class="filters-grid">
                            <select class="filter-select" v-model="selectedRarity">
                                <option value="">Rarity: All</option>
                                <option value="Common">Common</option>
                                <option value="Uncommon">Uncommon</option>
                                <option value="Rare">Rare</option>
                                <option value="Epic">Epic</option>
                                <option value="Legendary">Legendary</option>
                            </select>
                            <select class="filter-select" v-model="selectedSeason">
                                <option value="">Season: All</option>
                                <option value="Spring">Spring</option>
                                <option value="Summer">Summer</option>
                                <option value="Autumn">Autumn</option>
                                <option value="Winter">Winter</option>
                            </select>
                            <select class="filter-select" v-model="selectedWeather">
                                <option value="">Weather: All</option>
                                <option value="Sunny">Sunny</option>
                                <option value="Foggy">Foggy</option>
                                <option value="Light Snow">Light Snow</option>
                                <option value="Heavy Snow">Heavy Snow</option>
                            </select>
                            <select class="filter-select" v-model="selectedLocation">
                                <option value="">Location: All</option>
                                <option value="Riverside">Riverside</option>
                                <option value="Midstream">Midstream</option>
                                <option value="Ice Hole">Ice Hole</option>
                                <option value="Wreckage">Wreckage</option>
                                <option value="Dock">Dock</option>
                                <option value="Boulder">Boulder</option>
                                <option value="River Bend">River Bend</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Journal List layout -->
                <div>
                    <div class="journal-header">
                        <span class="journal-stats">
                            Showing {{ filteredFishList.length }} / {{ FISH_DATABASE.length }} species &bull; Click card to mark as caught
                        </span>
                    </div>

                    <div class="journal-grid">
                        <div v-for="fish in filteredFishList" :key="fish.name" class="fish-card" :class="{ caught: caughtFish[fish.name] }" @click="toggleCaught(fish.name)">
                            <div>
                                <div class="fish-card-header">
                                    <div class="fish-title-wrap">
                                        <span class="fish-emoji">{{ fish.emoji }}</span>
                                        <div>
                                            <h3 class="fish-name">{{ fish.name }}</h3>
                                            <span class="badge-rarity" :class="fish.rarity">{{ fish.rarity }}</span>
                                        </div>
                                    </div>
                                </div>
                                <p class="fish-desc" style="margin-top: 8px;">{{ fish.description }}</p>
                                
                                <div class="fish-metadata">
                                    <span class="metadata-tag">⚙️ Rod: {{ fish.rod }}</span>
                                    <span class="metadata-tag">📍 Spot: {{ fish.spots.join(', ') }}</span>
                                    <span class="metadata-tag">☁️ Weather: {{ fish.weather.join(', ') }}</span>
                                    <span class="metadata-tag">🍂 Seasons: {{ fish.seasons.join(', ') }}</span>
                                    <span class="metadata-tag">🕒 Time: {{ fish.times.join(', ') }}</span>
                                </div>
                            </div>

                            <div class="fish-card-footer">
                                <div class="check-caught">
                                    <span class="check-indicator">
                                        <span v-if="caughtFish[fish.name]">✓</span>
                                    </span>
                                    <span>{{ caughtFish[fish.name] ? 'Caught' : 'Uncaught' }}</span>
                                </div>
                                <span class="fish-price-label">{{ fish.value }} 🍪</span>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- ── GEAR GUIDE TAB ── -->
            <template v-if="currentTab === 'gear'">
                <div class="gear-assistant-container">
                    <!-- Left Column: Setting conditions -->
                    <div class="glass-card">
                        <div class="card-header">
                            <h2 class="card-title">🍂 Cabin Conditions</h2>
                        </div>
                        
                        <p style="font-size: 12px; color: var(--txt-2); margin-bottom: 16px;">
                            Configure the current seasonal cabin environment to get optimized rod and gear configurations.
                        </p>

                        <div class="condition-grid">
                            <div class="condition-box">
                                <label>Current Season</label>
                                <select class="filter-select" style="padding: 10px;" v-model="currentGearSeason">
                                    <option value="Spring">Spring</option>
                                    <option value="Summer">Summer</option>
                                    <option value="Autumn">Autumn</option>
                                    <option value="Winter">Winter</option>
                                </select>
                            </div>
                            <div class="condition-box">
                                <label>Weather</label>
                                <select class="filter-select" style="padding: 10px;" v-model="currentGearWeather">
                                    <option value="Sunny">Sunny</option>
                                    <option value="Foggy">Foggy</option>
                                    <option value="Light Snow">Light Snow</option>
                                    <option value="Heavy Snow">Heavy Snow</option>
                                </select>
                            </div>
                            <div class="condition-box">
                                <label>Location Spot</label>
                                <select class="filter-select" style="padding: 10px;" v-model="currentGearLocation">
                                    <option value="Riverside">Riverside</option>
                                    <option value="Midstream">Midstream</option>
                                    <option value="Ice Hole">Ice Hole</option>
                                    <option value="Wreckage">Wreckage</option>
                                    <option value="Dock">Dock</option>
                                    <option value="Boulder">Boulder</option>
                                    <option value="River Bend">River Bend</option>
                                </select>
                            </div>
                            <div class="condition-box">
                                <label>Time of Day</label>
                                <select class="filter-select" style="padding: 10px;" v-model="currentGearTime">
                                    <option value="Morning">Morning</option>
                                    <option value="Afternoon">Afternoon</option>
                                    <option value="Dawn">Dawn</option>
                                    <option value="Dusk">Dusk</option>
                                    <option value="Night">Night</option>
                                    <option value="After Midnight">After Midnight</option>
                                </select>
                            </div>
                        </div>

                        <!-- Recommendations panel -->
                        <div class="recommendation-panel" v-if="recommendedSetup">
                            <h3 class="rec-title">🎯 Recommended Gear</h3>
                            <div class="rec-item">
                                <strong>Rod Class:</strong> <span>{{ recommendedSetup.rodRecommendation }}</span>
                            </div>
                            <div class="rec-item">
                                <strong>Suggested Hook:</strong> <span>{{ recommendedSetup.hook }}</span>
                            </div>
                            <div class="rec-item">
                                <strong>Suggested Bait:</strong> <span>{{ recommendedSetup.bait }}</span>
                            </div>
                        </div>
                        <div class="recommendation-panel" style="background: rgba(255,83,104,0.05); border-color: rgba(255,83,104,0.15);" v-else>
                            <h3 class="rec-title" style="color: var(--red);">⚠️ No Active Species</h3>
                            <p style="font-size: 12px; color: var(--txt-2);">
                                No fish matches this exact combination of environmental factors. Try checking other times or spots!
                            </p>
                        </div>
                    </div>

                    <!-- Right Column: List active species -->
                    <div class="glass-card" style="display: flex; flex-direction: column;">
                        <div class="card-header">
                            <h2 class="card-title">🐟 Active Fish Pool</h2>
                            <span style="font-family: var(--mono); font-size: 11px; color: var(--txt-3);">{{ recommendedFish.length }} species</span>
                        </div>

                        <p style="font-size: 12px; color: var(--txt-2); margin-bottom: 16px;">
                            Fish species you can catch under these conditions:
                        </p>

                        <div style="flex-grow: 1; max-height: 350px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 4px;">
                            <div v-if="recommendedFish.length === 0" class="bucket-empty" style="border: none; padding: 40px 0;">
                                <span class="bucket-empty-icon">📭</span>
                                <span>No active species to show.</span>
                            </div>
                            <div v-for="fish in recommendedFish" :key="fish.name" class="bucket-item" style="padding: 8px 12px;">
                                <div class="bucket-item-info">
                                    <span class="bucket-item-emoji">{{ fish.emoji }}</span>
                                    <div>
                                        <div class="bucket-item-name">{{ fish.name }}</div>
                                        <span class="badge-rarity" style="font-size: 7px; padding: 1px 4px; display: inline-block; margin-top: 2px;" :class="fish.rarity">
                                            {{ fish.rarity }}
                                        </span>
                                    </div>
                                </div>
                                <span class="fish-price-label">{{ fish.value }} 🍪</span>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- ── COLLECTION STATISTICS TAB ── -->
            <template v-if="currentTab === 'stats'">
                <div class="gear-assistant-container">
                    
                    <!-- Left: Analytics & Charts -->
                    <div class="glass-card">
                        <div class="card-header">
                            <h2 class="card-title">📊 Collection Analytics</h2>
                        </div>

                        <!-- Progress Bar Caught -->
                        <div style="margin-bottom: 24px;">
                            <div style="display: flex; justify-content: space-between; font-size: 13px; font-weight: 500; margin-bottom: 6px;">
                                <span>Journal Completion Rate</span>
                                <span style="color: var(--mint); font-family: var(--mono);">{{ totalCaughtCount }} / {{ totalJournalCount }} caught ({{ caughtPercentage }}%)</span>
                            </div>
                            <div style="width: 100%; height: 8px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 99px; overflow: hidden;">
                                <div style="height: 100%; background: var(--mint); border-radius: 99px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1);" :style="{ width: caughtPercentage + '%' }"></div>
                            </div>
                        </div>

                        <!-- Rarity Distribution charts -->
                        <div style="display: flex; flex-direction: column; gap: 14px;">
                            <h3 style="font-size: 11px; font-family: var(--mono); letter-spacing: 1.5px; text-transform: uppercase; color: var(--txt-2);">
                                Caught Rarity Distribution
                            </h3>
                            
                            <!-- Common bar -->
                            <div>
                                <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px;">
                                    <span class="badge-rarity Common" style="font-size: 7px; padding: 1px 6px;">Common</span>
                                    <span style="font-family: var(--mono); color: var(--txt-2);">{{ rarityDistribution.Common.count }} caught ({{ rarityDistribution.Common.pct }}%)</span>
                                </div>
                                <div style="width: 100%; height: 6px; background: rgba(255,255,255,0.02); border-radius: 99px; overflow: hidden;">
                                    <div style="height: 100%; background: var(--txt-2); border-radius: 99px;" :style="{ width: rarityDistribution.Common.pct + '%' }"></div>
                                </div>
                            </div>

                            <!-- Uncommon bar -->
                            <div>
                                <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px;">
                                    <span class="badge-rarity Uncommon" style="font-size: 7px; padding: 1px 6px;">Uncommon</span>
                                    <span style="font-family: var(--mono); color: var(--txt-2);">{{ rarityDistribution.Uncommon.count }} caught ({{ rarityDistribution.Uncommon.pct }}%)</span>
                                </div>
                                <div style="width: 100%; height: 6px; background: rgba(255,255,255,0.02); border-radius: 99px; overflow: hidden;">
                                    <div style="height: 100%; background: var(--teal); border-radius: 99px;" :style="{ width: rarityDistribution.Uncommon.pct + '%' }"></div>
                                </div>
                            </div>

                            <!-- Rare bar -->
                            <div>
                                <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px;">
                                    <span class="badge-rarity Rare" style="font-size: 7px; padding: 1px 6px;">Rare</span>
                                    <span style="font-family: var(--mono); color: var(--txt-2);">{{ rarityDistribution.Rare.count }} caught ({{ rarityDistribution.Rare.pct }}%)</span>
                                </div>
                                <div style="width: 100%; height: 6px; background: rgba(255,255,255,0.02); border-radius: 99px; overflow: hidden;">
                                    <div style="height: 100%; background: var(--blue); border-radius: 99px;" :style="{ width: rarityDistribution.Rare.pct + '%' }"></div>
                                </div>
                            </div>

                            <!-- Epic bar -->
                            <div>
                                <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px;">
                                    <span class="badge-rarity Epic" style="font-size: 7px; padding: 1px 6px;">Epic</span>
                                    <span style="font-family: var(--mono); color: var(--txt-2);">{{ rarityDistribution.Epic.count }} caught ({{ rarityDistribution.Epic.pct }}%)</span>
                                </div>
                                <div style="width: 100%; height: 6px; background: rgba(255,255,255,0.02); border-radius: 99px; overflow: hidden;">
                                    <div style="height: 100%; background: var(--purple); border-radius: 99px;" :style="{ width: rarityDistribution.Epic.pct + '%' }"></div>
                                </div>
                            </div>

                            <!-- Legendary bar -->
                            <div>
                                <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px;">
                                    <span class="badge-rarity Legendary" style="font-size: 7px; padding: 1px 6px;">Legendary</span>
                                    <span style="font-family: var(--mono); color: var(--txt-2);">{{ rarityDistribution.Legendary.count }} caught ({{ rarityDistribution.Legendary.pct }}%)</span>
                                </div>
                                <div style="width: 100%; height: 6px; background: rgba(255,255,255,0.02); border-radius: 99px; overflow: hidden;">
                                    <div style="height: 100%; background: var(--amber); border-radius: 99px;" :style="{ width: rarityDistribution.Legendary.pct + '%' }"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Right: Backup, Settings & Danger Zone -->
                    <div class="glass-card" style="display: flex; flex-direction: column; gap: 20px;">
                        <div>
                            <div class="card-header">
                                <h2 class="card-title">💾 Backup & Sync</h2>
                            </div>
                            <p style="font-size: 12px; color: var(--txt-2); margin-bottom: 16px;">
                                Export or import your fishing logs, totals, and checklist data as a backup file.
                            </p>

                            <div style="display: flex; flex-direction: column; gap: 10px;">
                                <button class="btn btn-secondary" style="width: 100%;" @click="exportBackup">
                                    📥 Export Data Backup (.json)
                                </button>
                                
                                <div style="position: relative;">
                                    <button class="btn btn-secondary" style="width: 100%;" onclick="document.getElementById('import-file-input').click()">
                                        📤 Import Data Backup (.json)
                                    </button>
                                    <input type="file" id="import-file-input" accept=".json" style="display: none;" @change="importBackup">
                                </div>
                            </div>
                        </div>

                        <div style="border-top: 1px solid var(--border); padding-top: 20px;">
                            <div class="card-header">
                                <h2 class="card-title" style="color: var(--red);">⚠️ Danger Zone</h2>
                            </div>
                            <p style="font-size: 12px; color: var(--txt-2); margin-bottom: 16px;">
                                Irreversible actions. Restoring defaults will clear your checklist records.
                            </p>
                            
                            <button class="btn btn-danger" style="width: 100%;" @click="clearChecklist">
                                🗑️ Reset Caught Journal Checklist
                            </button>
                        </div>
                    </div>

                </div>
            </template>

        </main>

        <!-- Toast Notifications -->
        <div class="toast" :class="{ show: toastVisible }">
            <span>{{ toastIcon }}</span>{{ toastMsg }}
        </div>
    </div>

    <!-- Application Javascript code -->
    <script src="app.js"></script>
</body>
</html>
